<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="last-modified" content="2026-04-10">
  <title>Tools</title>
  <link rel="stylesheet" href="tokens.css">
  <script>
    (function () {
      const stored = localStorage.getItem('theme');
      const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.theme = stored || preferred;
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      font-size: var(--font-size-base);
      line-height: var(--line-height-base);
      color: var(--color-text);
      background: var(--color-bg);
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: var(--space-10) var(--space-6);
      width: 100%;
    }

    .page-header {
      margin-bottom: var(--space-10);
    }

    .page-title {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }

    .page-subtitle {
      color: var(--color-muted);
      font-size: var(--font-size-sm);
    }

    .category {
      margin-bottom: var(--space-8);
    }

    .category-heading {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--color-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--space-2);
      padding-bottom: var(--space-2);
      border-bottom: 1px solid var(--color-border);
    }

    .tool-list {
      list-style: none;
    }

    .tool-item {
      border-bottom: 1px solid var(--color-border-subtle);
    }

    .tool-item:last-child {
      border-bottom: none;
    }

    .tool-link {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: baseline;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      text-decoration: none;
      color: inherit;
    }

    .tool-name {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--color-accent);
      white-space: nowrap;
      text-decoration: none;
    }

    .tool-link:hover .tool-name {
      text-decoration: underline;
    }

    .tool-desc {
      color: var(--color-muted);
      font-size: var(--font-size-sm);
    }

    /* Footer */
    .site-footer {
      border-top: 1px solid var(--color-border);
      padding: var(--space-3) var(--space-6);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: var(--space-4);
    }

    .footer-links {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: max-content;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--font-size-xs);
      color: var(--color-muted);
    }

    .footer-links a {
      color: var(--color-muted);
      text-decoration: none;
    }

    .footer-links a:hover {
      color: var(--color-accent);
      text-decoration: underline;
    }

    .footer-sep { opacity: 0.4; }

    .theme-toggle {
      background: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-1) var(--space-3);
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: var(--font-size-xs);
      color: var(--color-muted);
      transition: background var(--transition-base), color var(--transition-base);
    }

    .theme-toggle:hover {
      background: var(--color-surface);
      color: var(--color-text);
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="page-header">
      <h1 class="page-title">Tools</h1>
      <p class="page-subtitle">Small front-end utilities and proofs-of-concept.</p>
    </header>

    <section class="category">
      <h2 class="category-heading">Converters</h2>
      <ul class="tool-list">
        <li class="tool-item">
          <a class="tool-link" href="color-converter/">
            <span class="tool-name">Color Converter</span>
            <span class="tool-desc">Convert between HEX, RGB, HSL and CSS named colors</span>
          </a>
        </li>
      </ul>
    </section>
  </div>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="https://github.com/placeholder/tools" target="_blank" rel="noopener">GitHub</a>
      <span class="footer-sep">|</span>
      <span>Updated: <span id="last-updated"></span></span>
    </div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle colour theme"></button>
  </footer>

  <script>
    const d = document.querySelector('meta[name="last-modified"]')?.content;
    if (d) document.getElementById('last-updated').textContent = d;

    const toggle = document.getElementById('theme-toggle');
    function syncLabel() {
      toggle.textContent = document.documentElement.dataset.theme === 'dark' ? '☀ Light' : '☾ Dark';
    }
    syncLabel();
    toggle.addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
      syncLabel();
    });
  </script>

</body>
</html>
